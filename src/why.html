<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="...">
	<link rel="icon" href="/asset/icon/eu.png?v=1" type="image/png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
	<title>First Domino</title>
		<style>
			:root {
				--color-bright-snow: #F9F9F8;
				--color-alabaster-gray: #E5E5E2;
				--color-carbon-black: #1C1E1F;
				--color-smart-blue: #4062BB;
				--color-taupe: #807172;
				--font-heading: "EB Garamond", serif;
				--font-body: "Instrument Sans", sans-serif;
				--font-accent: "Dancing Script", cursive;
				--font-size-h1: 2.5rem;
				--font-size-h2: 2rem;
				--font-size-h3: 1.5rem;
				--font-size-body: 1rem;
				--font-size-sm: 0.875rem;
				--line-height-heading: 1.2;
				--line-height-body: 1.6;
			}
			@media screen and (max-width: 768px) {
				:root {
					--font-size-h1: 2rem;
					--font-size-h2: 1.6rem;
					--font-size-h3: 1.3rem;
				}
			}
			h1, h2, h3 {
				font-family: var(--font-heading);
				color: var(--color-smart-blue);
				line-height: var(--line-height-heading);
				margin-bottom: 0.5em;
			}
			h1 { font-size: var(--font-size-h1); }
			h2 { font-size: var(--font-size-h2); }
			h3 { font-size: var(--font-size-h3); }
			body {
				font-family: var(--font-body);
				font-size: var(--font-size-body);
				line-height: var(--line-height-body);
				color: var(--color-carbon-black);
				background-color: var(--color-bright-snow);
			}
			* {
				box-sizing: border-box;
				padding: 0px;
				margin: 0px;
			}


			nav {
				display: flex;
				flex-direction: row;
				justify-content: space-between;
				align-items: center;
				min-width: 100vw;
				max-width: 100vw;
				padding: 16px 32px;
				background-color: var(--color-alabaster-gray);
			}

			.navigation_brand {
				font-family: var(--font-accent);
				font-size: var(--font-size-h3);
				color: var(--color-smart-blue);
				text-decoration: none;
			}

			.navigation_links {
				display: flex;
				flex-direction: row;
				justify-content: start;
				align-items: center;
				gap: 8px;
			}

			.navigation_goto {
				font-family: var(--font-body);
				font-size: var(--font-size-body);
				color: var(--color-carbon-black);
				text-decoration: none;
				padding: 8px 16px;
				border-radius: 4px;
			}
			.navigation_goto:hover {
				color: var(--color-smart-blue);
			}

			banner {
				display: flex;
				flex-direction: row;
				justify-content: start;
				align-items: start;
				background-color: whitesmoke;
				border-radius: 4px;
				padding-left: 32px;
				padding-right: 32px;
			}

			.page {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
				overflow-x: hidden;
				overflow-y: scroll;
			}
			.footer {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
			}
			.gutter {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
				min-width: 1014px;
				max-width: 1440px;
				padding-left: 32px;
				padding-right: 32px;
			}
			.section {
				display: flex;
				flex-direction: row;
				justify-content: center;
				align-items: center;
			}
			.section-offset {
				display: "flex"
			}
		</style>
</head>
<body>
	<div class="page">
		<nav>
			<a class="navigation_brand" href="/">First Domino</a>
			<div class="navigation_links">
				<a class="navigation_goto" href="/">Home</a>
			</div>
		</nav>

		<div class="gutter">
			<div class="section">
				<h1>Why a Federal Europe?</h1>
			</div>
		</div>
	</div>
</body>
</html>
