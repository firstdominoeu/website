<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="...">
		<link rel="icon" href="/asset/icon/eu.png?v=1" type="image/png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
		<title>First Domino</title>
		<style>
			:root {
				--color-bright-snow: #F9F9F8;
				--color-alabaster-gray: #E5E5E2;
				--color-carbon-black: #1C1E1F;
				--color-smart-blue: #4062BB;
				--color-taupe: #807172;
				--font-heading: "EB Garamond", serif;
				--font-body: "Instrument Sans", sans-serif;
				--font-accent: "Dancing Script", cursive;
				--font-size-h1: 2.5rem;
				--font-size-h2: 2rem;
				--font-size-h3: 1.5rem;
				--font-size-body: 1rem;
				--font-size-sm: 0.875rem;
				--line-height-heading: 1.2;
				--line-height-body: 1.6;
			}
			@media screen and (max-width: 768px) {
				:root {
					--font-size-h1: 2rem;
					--font-size-h2: 1.6rem;
					--font-size-h3: 1.3rem;
				}
			}
			h1, h2, h3 {
				font-family: var(--font-heading);
				color: var(--color-smart-blue);
				line-height: var(--line-height-heading);
				margin-bottom: 0.5em;
			}
			h1 { font-size: var(--font-size-h1); }
			h2 { font-size: var(--font-size-h2); }
			h3 { font-size: var(--font-size-h3); }
			body {
				font-family: var(--font-body);
				font-size: var(--font-size-body);
				line-height: var(--line-height-body);
				color: var(--color-carbon-black);
				background-color: var(--color-bright-snow);

				/* footer css*/
				min-height: 100vh;
    			display:flex;
    			flex-direction: column;
			}
			* {
				box-sizing: border-box;
				padding: 0px;
				margin: 0px;
			}
			nav {
				display: flex;
				flex-direction: row;
				justify-content: start;
				align-items: start;
				min-width: 100vw;
				max-width: 100vw;
			}
			banner {
				display: flex;
				flex-direction: row;
				justify-content: start;
				align-items: start;
				background-color: whitesmoke;
				border-radius: 4px;
				padding-left: 32px;
				padding-right: 32px;
			}
			.page {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
				overflow-x: hidden;
				overflow-y: scroll;
			}
			footer {
				margin-top: auto;
				padding-bottom: 1.5rem;
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
			}
			.footer {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
			}
			.footer-icons {
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 2rem;
				margin-bottom: 0.5rem;
			}
			.footer-icons img {
				width: 18px;
				height: auto;
			}
			.footer-icons a {
				display: inline-block;
				transition: transform 0.2s ease;
			}
			.footer-icons a:hover {
				transform: translateY(-4px);
			}
			.copyright {
				text-align: center;
				font-size: 15px;
				font-family: var(--font-heading);
			}
			.gutter {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
				min-width: 1014px;
				max-width: 1440px;
				padding-left: 32px;
				padding-right: 32px;
			}
			.section {
				display: flex;
				flex-direction: row;
				justify-content: center;
				align-items: center;
			}
			.section-offset {
				display: "flex"
			}
		</style>
	</head>
	<body>
		<page>
			<navigation>
				<navigation-button to="/Who">Who</navigation-button>
				<navigation-button to="/Why">Why</navigation-button>
			</navigation>
			<div style="background-color: black;">
				<spin-star-loader
					size="64px"
					fade-in-duration-ms="900"
					fade-hold-duration-ms="700"
					fade-out-duration-ms="800"
					spin-in-duration-ms="600"
				>
				</spin-star-loader>
			</div>
			<footer>
				<div class="footer-icons">
					<a href="https://discord.com/invite/yusaMQsDpc" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/discord.svg?v=1" alt="Discord">
					</a>
					<a href="https://www.instagram.com/firstdominoeu/" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/instagram.svg" alt="Instagram">
					</a>
					<a href="https://www.tiktok.com/@firstdominoeu" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/tiktok.svg" alt="Tiktok">
					</a>
					<a href="https://x.com/FirstDominoEU" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/x.svg" alt="X">
					</a>
					<a href="https://mastodon.social/@firstdominoeu" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/mastodon.svg" alt="Mastodon">
					</a>
					<a href="https://www.facebook.com/people/Firstdominoeu-Firstdominoeu/pfbid0g2XLQmq3yknYwbk4eFZo6xKJokWJKCtFXHfeW3TTCxfaSGyCPkmS93AzFn8dnwpvl/" target="_blank" rel="noopener noreferrer">
						<img src="asset/icon/social/facebook.svg" alt="Facebook">
					</a>
				</div>  
				<p class="copyright">© 2026 FIRST DOMINO</p>
			</footer>
		</page>
		<script>
			class Color {
				static BRIGHT_SNOW = "#F9F9F8";
				static ALABASTER_GRAY = "#E5E5E2";
				static CARBON_BLACK = "#1C1E1F";
				static SMART_BLUE = "#4062BB";
				static TAUPE = "#807172";
			}

			class Font {
				static HEADING = "\"EB Garamond\", serif";
				static BODY = "\"Instrument Sans\", sans-serif";
			}

			Object.freeze(Color);
			Object.freeze(Font);

			class Page extends HTMLElement {
				constructor() {
					super();

					this.attachShadow({
						mode: "open"
					});
					this.shadowRoot.innerHTML = `
						<style>
							:host {
								display: flex;
								flex-direction: column;
								justify-content: start;
								align-items: center;
								overflow-x: hidden;
								overflow-y: scroll;
							}
						</style>
						<slot></slot>
					`;
				}
			}
			
			class NavigationButton extends HTMLElement {
				constructor() {
					super();
					
					const to = this.getAttribute("to");
					
					this.attachShadow({
						mode: "open"
					});
					this.shadowRoot.innerHTML = `
						<style>
							.link {
								all: unset;
							}
							.button {
								display: flex;
								flex-direction: row;
								justify-content: center;
								align-items: center;
								font-size: 1em;
								font-family: ${Font.BODY};
								font-weight: normal;
								color: ${Color.CARBON_BLACK};
							}
						</style>
						<a href="${to}" class="link">
							<button class="button">
								<slot></slot>
							</button>
						</a>
					`;
				}
			}

			class SpinStarLoader extends HTMLElement {
				constructor() {
					super();

					const size = this.getAttribute("size");
					const fadeInDurationMs = parseInt(this.getAttribute("fade-in-duration-ms"));
					const fadeHoldDurationMs = parseInt(this.getAttribute("fade-hold-duration-ms"));
					const fadeOutDurationMs = parseInt(this.getAttribute("fade-out-duration-ms"));
					const fadeOutDelayMs = fadeInDurationMs + fadeHoldDurationMs;
					const fadeTotalDurationMs = fadeOutDelayMs + fadeOutDurationMs;
					const spinInDurationMs = parseInt(this.getAttribute("spin-in-duration-ms"));

					if (spinInDurationMs > fadeInDurationMs) {
						throw new Error("spin-star-loader: spin in animation may not outlive its fade in duration");
					}

					this.attachShadow({
						mode: "open"
					});
					this.shadowRoot.innerHTML = `
						<style>
							:host {
								display: flex;
								flex-direction: column;
								justify-content: center;
								align-items: center;
								will-change: opacity, visibility;
							}
							:host(.hidden) {
								opacity: 0;
								visibility: hidden;
								pointer-events: none;
								transition:
									opacity ${fadeOutDurationMs}ms ease-out,
									visibility ${fadeOutDurationMs}ms;
							}
							.img {
								display: flex;
								flex-direction: column;
								justify-content: center;
								align-items: center;
								min-width: ${size};
								max-width: ${size};
								object-fit: contain;
								aspect-ratio: 1 / 1;
							}
							.from_spin {
								animation-timeline: view();
								animation-range:
									entry 0%
									entry 100%;
								animation:
									from_fade ${fadeInDurationMs}ms ease-out forwards,
									from_spin ${spinInDurationMs}ms cubic-bezier(0.34, 1.56, 0.64, 1) 0ms forwards,
									to_fade ${fadeOutDurationMs}ms ease-in ${fadeOutDelayMs}ms forwards;
							}
							@keyframes from_fade {
								0% {
									opacity: 0;
								}
								100% {
									opacity: 1;
								}
							}
							@keyframes from_spin {
								0% {
									transform: rotate(-180deg);
								}
								100% {
									transform: rotate(0deg);
								}
							}
							@keyframes to_fade {
								0% {
									opacity: 1;
								}
								100% {
									opacity: 0;
								}
							}
						</style>
						<img class="from_spin img" src="/asset/icon/eu.png?v=1">
					`;

					setTimeout(() => this.classList.add("hidden"), fadeTotalDurationMs);
				}
			}

			customElements.define("page", Page);
			customElements.define("navigation-button", NavigationButton);
			customElements.define("spin-star-loader", SpinStarLoader);
		</script>
	</body>
</html>
