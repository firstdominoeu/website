<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="A pan-european movement">
		<link rel="icon" blocking="render" href="/asset/icon/eu.png?v=1" type="image/png">
		<link rel="preconnect" blocking="render" href="https://fonts.googleapis.com">
		<link rel="preconnect" blocking="render" href="https://fonts.gstatic.com" crossorigin>
		<link rel="stylesheet" blocking="render" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
		<link rel="stylesheet" blocking="render" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap">
		<link rel="stylesheet" blocking="render" href="css/banner.css">
		<link rel="stylesheet" blocking="render" href="css/constant.css">
		<link rel="stylesheet" blocking="render" href="css/footer.css">
		<link rel="stylesheet" blocking="render" href="css/navigation.css">
		<link rel="stylesheet" blocking="render" href="css/reset.css">
		<style>
			support {
				display: block;
			    width: 100%;
			    max-width: 100%;
			    background: var(--color-carbon-black-gradient);
			    border-radius: 4px;
			    padding: var(--space-md) 0;
			    overflow: hidden;
			}
			support-slide {
				display: flex;
			    align-items: center;
			    justify-content: center;
			    width: auto !important;
			    padding: 0 var(--space-xl);
			}
			support-slide span {
				font-family: var(--font-body);
			    color: var(--color-bright-snow);
			    font-size: 1.5em;
			    font-weight: 500;
			    white-space: nowrap;
			}
			
			@media (width <= 768px) {
				support {
					display: none;
				}
			}
		</style>
		<script blocking="render" src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
		<script blocking="render" src="https://cdn.jsdelivr.net/npm/@splidejs/splide-extension-auto-scroll@0.5.3/dist/js/splide-extension-auto-scroll.min.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				let supporters = document.getElementById("supporters");
				if (supporters) {
					supporters.classList.add("splide");
					supporters.querySelector("support-track")?.classList.add("splide__track");
					supporters.querySelector("support-list")?.classList.add("splide__list");
					supporters.querySelectorAll("support-slide").forEach(slide => {
						slide.classList.add("splide__slide");
					});
				}

				new Splide("#supporters", {
					type: "loop",
					drag: "free",
					focus: "center",
					perPage: 1,
					autoWidth: true,
					gap: 0,
					arrows: false,
					pagination: false,
					start: 2,
					autoScroll: {
						speed: 0.25,
						pauseOnHover: true,
						pauseOnFocus: false
					}
				})
				.mount(window.splide.Extensions);
			});
		</script>
		<title>First Domino</title>
	</head>
	<body>
		<page>
			<section>
				<navigation>
					<logo><a href="/">First Domino</a></logo>
					<dot>•</dot>
					<button-group>
						<button>
							<a href="/manifesto">Manifesto</a>
							<span>
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link" aria-hidden="true">
									<path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
								</svg>
							</span>
						</button>
						<button>
							<a href="/why-a-federal-europe">Why a Federal Europe</a>
							<span>
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link" aria-hidden="true">
									<path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
								</svg>
							</span>
						</button>
					</button-group>
				</navigation>
			</section>
			<section>
				<banner>
					<header>
						<layer><spinning-star-loader><img src="asset/icon/eu.png"></spinning-star-loader></layer>
						<layer><logo>First Domino</logo></layer>
					</header>
					<content>
						<side>
							<headline>
								<major>A Pan-European Movement</major>
								<minor>The Future is Federal</minor>
							</headline>
							<button-group>
								<button>
									<a href="discord.com/invite/yusaMQsDpc">Join</a>
									<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link" aria-hidden="true">
										<path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
									</svg>
								</button>
								<button>
									<a href="/why-a-federal-europe">Learn More</a>
									<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link" aria-hidden="true">
										<path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
									</svg>
								</button>
							</button-group>
						</side>
						<illustration><img src="/asset/image/flag.jpg"></illustration>
					</content>
				</banner>
			</section>
			<support id="supporters">
				<support-track>
					<support-list>
						<support-slide><span>PolishDane</span></support-slide>
						<support-slide><span>Alex_EU</span></support-slide>
						<support-slide><span>Mariana_V</span></support-slide>
						<support-slide><span>JohnDoe</span></support-slide>
						<support-slide><span>Elena_Federalist</span></support-slide>
					</support-list>
				</support-track>
			</support>
			<footer>
				<group>
					<a href="https://discord.com/invite/yusaMQsDpc" target="_blank" rel="noopener noreferrer"><img alt="Discord" src="asset/icon/social/discord.svg"></a>
					<a href="https://www.tiktok.com/@firstdominoeu" target="_blank" rel="noopener noreferrer"><img alt="TikTok" src="asset/icon/social/tiktok.svg"></a>
					<a href="https://www.instagram.com/firstdominoeu" target="_blank" rel="noopener noreferrer"><img alt="Instagram" src="asset/icon/social/instagram.svg"></a>
					<a href="https://x.com/FirstDominoEU" target="_blank" rel="noopener noreferrer"><img alt="X" src="asset/icon/social/x.svg"></a>
					<a href="https://mastodon.social/@firstdominoeu" target="_blank" rel="noopener noreferrer"><img alt="Mastodon" src="asset/icon/social/mastodon.svg"></a>
					<a href="https://www.facebook.com/people/Firstdominoeu-Firstdominoeu/pfbid0g2XLQmq3yknYwbk4eFZo6xKJokWJKCtFXHfeW3TTCxfaSGyCPkmS93AzFn8dnwpvl" target="_blank" rel="noopener noreferrer"><img alt="Facebook" src="asset/icon/social/facebook.svg"></a>
				</group>
				<copyright>© 2026 First Domino</copyright>
			</footer>
		</page>
	</body>
</html>
