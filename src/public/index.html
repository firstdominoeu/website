<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="...">
		<link rel="icon" href="/asset/icon/eu.png?v=1" type="image/png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="/index.css">
		<style>
			:root {
				--color-bright-snow: #F9F9F8;
				--color-alabaster-gray: #E5E5E2;
				--color-carbon-black: #1C1E1F;
				--color-smart-blue: #4062BB;
				--color-taupe: #807172;
				--color-carbon-black-gradient: linear-gradient(145deg, #242628 0%, #161718 100%);
				--font-heading: "EB Garamond", serif;
				--font-body: "Instrument Sans", sans-serif;
				--font-accent: "Dancing Script", cursive;
				--font-size-h1: 2.5rem;
				--font-size-h2: 2rem;
				--font-size-h3: 1.5rem;
				--font-size-body: 1rem;
				--font-size-sm: 0.875rem;
				--line-height-heading: 1.2;
				--line-height-body: 1.6;
				--space-sx: 0.25rem;
				--space-sm: 0.5rem;
				--space-md: 1rem;
				--space-lg: 1.5rem;
				--space-xl: 2rem;
				--space-2xl: 3rem;
				--pad-sm: clamp(0.5rem, 1vw + 0.25rem, 0.75rem);
				--pad-md: clamp(1rem, 2vw + 0.5rem, 1.5rem);
				--pad-lg: clamp(1.5rem, 4vw + 0.5rem, 3rem);
			}
			@media screen and (max-width: 768px) {
				:root {
					--font-size-h1: 2rem;
					--font-size-h2: 1.6rem;
					--font-size-h3: 1.3rem;
					--space-lg: 1.25rem;
					--space-xl: 1.5rem;
					--space-2xl: 2rem;
				}
			}
			body {
				display: flex;
				flex-direction: column;
				justify-content: start;
				align-items: center;
				max-width: 100vw;
				font-family: var(--font-body);
				line-height: var(--line-height-body);
				color: var(--color-carbon-black);
			}
			page {
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-x: hidden;
				overflow-y: hidden;
				min-width: 100%;
				max-width: 1440px;
			}
			navigation {
				display: flex;
				align-items: center;
				min-width: 100%;
				max-width: 100%;
				overflow-x: hidden;
				overflow-y: hidden;
				gap: var(--space-sm);
			}
			navigation logo {
				display: block;
				font-size: 1em;
				font-family: var(--font-body);
				font-weight: bold;
				color: var(--color-carbon-black);
				cursor: pointer;
			}
			navigation logo a {
				all: unset;
			}
			navigation button-group {
				display: flex;
				gap: var(--space-sm);
			}
			navigation button {
				all: unset;
				display: flex;
				align-items: center;
				font-size: 0.75em;
				font-family: var(--font-body);
				font-weight: bold;
				color: var(--color-carbon-black);
				cursor: pointer;
				gap: var(--space-sx);
				text-decoration: underline;
				transition: transform 0.2s ease-out;
			}
			navigation button:hover {
				transform: translateY(-4px);
			}
			navigation button svg {
				width: 8px;
				height: 8px;
				color: black;
			}
			navigation button a {
				all: unset;
			}
			section {
				display: flex;
				justify-content: center;
				align-items: center;
				min-width: 100%;
				max-width: 100%;
				overflow-x: hidden;
				overflow-y: hidden;
				padding-top: var(--space-sm);
				padding-bottom: var(--space-sm);
				padding-left: var(--space-xl);
				padding-right: var(--space-xl);
			}
			banner spinning-star-loader {
				--size: 64px;
				--fade-in-duration: 900ms;
				--fade-hold-duration: 700ms;
				--fade-out-duration: 800ms;
				--spin-in-duration: 600ms;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				will-change: opacity, visibility;
			}
			banner spinning-star-loader.hidden {
				opacity: 0;
				visibility: hidden;
				pointer-events: none;
				transition: opacity var(--fade-out-duration) ease-out, visibility var(--fade-out-duration);
			}
			banner spinning-star-loader img {
				display: flex;
				justify-content: center;
				align-items: center;
				min-width: var(--size);
				max-width: var(--size);
				object-fit: contain;
				aspect-ratio: 1 / 1;
				animation-timeline: view();
				animation-range:
					entry 0%
					entry 100%;
				animation:
					banner-spinning-star-loader-from-fade var(--fade-in-duration) ease-out forwards,
					banner-spinning-star-loader-from-spin var(--spin-in-duration) ease-out 0ms forwards,
					banner-spinning-star-loader-to-fade var(--fade-out-duration) ease-in calc(var(--fade-in-duration) + var(--fade-hold-duration)) forwards;
			}
			@keyframes banner-spinning-star-loader-from-fade {
				0% {
					opacity: 0;
				}
				100% {
					opacity: 1;
				}
			}
			@keyframes banner-spinning-star-loader-from-spin {
				0% {
					transform: rotate(-180deg);
				}
				100% {
					transform: rotate(0deg);
				}
			}
			@keyframes banner-spinning-star-loader-to-fade {
				0% {
					opacity: 1;
				}
				100% {
					opacity: 0;
				}
			}
			banner {
				--gradient-eu-header-0: linear-gradient(135deg, var(--color-smart-blue) 0%, #12225B 100%);
				--gradient-eu-header-1: linear-gradient(135deg, #5C7EE6 0%, var(--color-smart-blue) 100%);
				--gradient-eu-header-2: linear-gradient(105deg, var(--color-smart-blue) 30%, #262F76 100%);

			}
			banner header {
				display: grid;
				grid-template-columns: repeat(1, 1fr);
				grid-template-rows: 1fr;
				min-width: 100%;
				background: var(--color-carbon-black-gradient);
				border-radius: 4px;
				padding: var(--space-sx);
			}
			banner header layer {
				grid-row-start: 1;
				grid-row-end: 2;
				grid-column-start: 1;
				grid-column-end: 2;
				display: flex;
				flex-direction: row;
				justify-content: center;
				align-items: center;
			}
			banner header logo {
				font-size: 2em;
				font-family: var(--font-body);
				font-weight: bold;
				color: var(--color-bright-snow);
				opacity: 0;
				animation:
					banner-header-heading-fade-in 600ms ease-out calc(900ms + 700ms + 800ms) forwards,
					banner-header-heading-lift-in 600ms ease-out calc(900ms + 700ms + 800ms) forwards;
			}
			banner headline {
				display: block;
			}

			banner major-headline {
				display: block;
				font-size: 7em;
				font-family: var(--font-body);
				font-weight: bold;
				color: var(--color-carbon-black);
			}
			@media screen and (max-width: 768px) {
				banner major-headline {
					font-size: 2em;
				}
			}
			@media screen and (max-width: 1300px) {
				banner major-headline {
					font-size: 3em;
				}
			}
			@media screen and (max-width: 1440px) {
				banner major-headline {
					font-size: 6em;
				}
			}

			banner minor-headline {
				display: block;
				font-size: 2em;
				font-family: var(--font-body);
				font-weight: bold;
				color: var(--color-carbon-black);
			}
			banner button-group {
				display: flex;
				gap: var(--space-md);
			}
			banner button {
				all: unset;
				cursor: pointer;
				display: flex;
				align-items: center;
				font-size: 1.5em;
				font-family: var(--font-body);
				font-weight: 600;
				color: var(--color-carbon-black);
				gap: var(--space-sm);
			}
			banner button a {
				all: unset;
				text-decoration: underline;
			}
			banner button svg {
				width: 16px;
				height: 16px;
				color: black;
			}
			banner content {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				grid-template-rows: 1fr;
				flex-direction: column;
				justify-content: start;
				align-items: start;
				min-width: 768px;
				max-width: 1440px;
			}
			banner content illustration {
				grid-row-start: 1;
				grid-row-end: 1;
				grid-column-start: 3;
				grid-column-end: 4;
				min-width: 100%;
				max-width: 100%;
				min-height: 100%;
				max-height: 100%;
				overflow-x: hidden;
				overflow-y: hidden;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			banner content illustration img {
				max-width: 500px;
			}
			@media screen and (max-width: 768px) {
				banner content illustration img {
					max-width: 100px;
				}
			}
			@media screen and (max-width: 1300px) {
				banner content illustration img {
					max-width: 400px;
				}
			}
			@media screen and (max-width: 1000px) {
				banner content illustration img {
					max-width: 300px;
				}
			}
			banner side {
				grid-row-start: 1;
				grid-row-end: 1;
				grid-column-start: 1;
				grid-column-end: 3;
				display: flex;
				flex-direction: column;
				min-width: 100%;
				max-width: 100%;
				min-height: 100%;
				max-height: 100%;
				gap: var(--space-2xl);
			}
			@keyframes banner-header-heading-fade-in {
				0% {
					opacity: 0;
				}
				100% {
					opacity: 1;
				}
			}
			@keyframes banner-header-heading-lift-in {
				0% {
					transform: translateY(4px);
				}
				100% {
					transform: translateY(0);
				}
			}

			support {
				display: grid;
				grid-template-columns: repeat(1, 1fr);
				grid-template-rows: 1fr;
				min-width: 100%;
				background: var(--color-carbon-black-gradient);
				border-radius: 4px;
				padding: var(--space-sx);
			}

			footer {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			footer group {
				display: flex;
				justify-content: center;
				align-items: center;
				gap: var(--space-xl);
				margin-bottom: 0.5rem;
			}
			footer a {
				transition: transform 0.2s ease;
			}
			footer a:hover {
				transform: translateY(-4px);
			}
			footer img {
				min-width: 16px;
				max-width: 16px;
			}
			footer copyright {
				text-align: center;
				font-size: var(--font-size-sm);
				font-family: var(--font-body);
			}
		</style>

	</head>
